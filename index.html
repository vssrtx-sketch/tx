<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="চাঁদের হাট - নিরাপদ অ্যাক্সেস গেটওয়ে | @TEAM_HBS">
    <title>চাঁদের হাট | প্রবেশদ্বার</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Hind+Siliguri:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #07060d;
            --card-bg: rgba(15, 12, 30, 0.55);
            --card-border: rgba(255, 255, 255, 0.08);
            --electric-blue: #00f2ff;
            --neon-purple: #a855f7;
            --success-green: #2ecc71;
            --error-red: #ff4757;
            --text-main: #f5f0ff;
            --text-muted: #9f9baa;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: 'Outfit', 'Hind Siliguri', sans-serif;
            min-height: 100dvh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* Ambient floating orbs */
        .bg-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(90px);
            opacity: 0.26;
            z-index: 0;
            pointer-events: none;
            animation: orbFloat 16s ease-in-out infinite alternate;
        }
        .orb-1 {
            width: 340px; height: 340px;
            background: radial-gradient(circle, var(--electric-blue) 0%, transparent 70%);
            top: -80px; left: -60px;
        }
        .orb-2 {
            width: 400px; height: 400px;
            background: radial-gradient(circle, var(--neon-purple) 0%, transparent 70%);
            bottom: -100px; right: -80px;
            animation-delay: -6s; animation-duration: 18s;
        }
        .orb-3 {
            width: 260px; height: 260px;
            background: radial-gradient(circle, #ff00ff 0%, transparent 70%);
            top: 40%; left: 55%;
            animation-duration: 24s; animation-delay: -3s;
        }

        @keyframes orbFloat {
            0%   { transform: translate(0, 0) scale(1); }
            50%  { transform: translate(40px, -35px) scale(1.12); }
            100% { transform: translate(-30px, 40px) scale(0.92); }
        }

        /* Subtle grid background */
        .grid-pattern {
            position: absolute; inset: 0;
            background-image:
                linear-gradient(rgba(255,255,255,0.018) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.018) 1px, transparent 1px);
            background-size: 52px 52px;
            z-index: 1; pointer-events: none;
        }

        /* Glassmorphic card */
        .glass-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 28px;
            padding: 44px 34px 36px;
            width: 92%; max-width: 440px;
            backdrop-filter: blur(28px);
            -webkit-backdrop-filter: blur(28px);
            box-shadow:
                0 32px 60px -16px rgba(0,0,0,0.7),
                inset 0 1px 0 rgba(255,255,255,0.1);
            z-index: 2; position: relative;
            text-align: center;
            transition: opacity 0.5s ease, transform 0.5s ease;
        }
        .glass-card.fade-out {
            opacity: 0; transform: scale(0.96); pointer-events: none;
        }

        /* Icon wrapper */
        .icon-wrap {
            position: relative;
            width: 82px; height: 82px;
            margin: 0 auto 22px;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.07);
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
        }
        .icon-ring {
            position: absolute; inset: -5px;
            border: 1.5px dashed rgba(168,85,247,0.45);
            border-radius: 50%;
            animation: ringRotate 22s linear infinite;
        }
        @keyframes ringRotate {
            0%   { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .icon-main {
            font-size: 38px;
            animation: iconBounce 3.5s ease-in-out infinite alternate;
        }
        @keyframes iconBounce {
            0%   { transform: translateY(0) scale(1); }
            100% { transform: translateY(-7px) scale(1.06); }
        }

        /* Title */
        .site-title {
            font-size: 34px; font-weight: 800;
            background: linear-gradient(135deg, var(--electric-blue) 0%, var(--neon-purple) 100%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 6px; letter-spacing: -0.5px;
        }
        .site-subtitle {
            font-size: 13.5px; color: var(--text-muted);
            margin-bottom: 8px; letter-spacing: 0.4px;
        }
        .site-tag {
            display: inline-block;
            background: rgba(168,85,247,0.12);
            border: 1px solid rgba(168,85,247,0.3);
            border-radius: 20px;
            padding: 3px 14px;
            font-size: 12px;
            color: var(--neon-purple);
            margin-bottom: 30px;
            letter-spacing: 0.5px;
        }

        /* Input */
        .input-group { position: relative; margin-bottom: 16px; }
        .password-input {
            width: 100%;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 14px;
            padding: 15px 20px;
            font-size: 18px;
            color: var(--text-main);
            text-align: center;
            letter-spacing: 6px;
            outline: none;
            transition: all 0.3s ease;
            font-family: 'Outfit', sans-serif;
        }
        .password-input::placeholder {
            letter-spacing: normal; font-size: 14px;
            color: rgba(255,255,255,0.22);
        }
        .password-input:focus {
            border-color: var(--neon-purple);
            background: rgba(255,255,255,0.05);
            box-shadow: 0 0 24px rgba(168,85,247,0.22), inset 0 0 10px rgba(168,85,247,0.08);
        }

        /* Button */
        .btn-submit {
            width: 100%; border: none; border-radius: 14px;
            padding: 15px; margin-top: 8px;
            background: linear-gradient(135deg, #00c6ff 0%, var(--neon-purple) 100%);
            color: #fff; font-size: 16px; font-weight: 600;
            cursor: pointer; outline: none;
            transition: all 0.3s ease;
            box-shadow: 0 4px 18px rgba(168,85,247,0.32);
            display: flex; align-items: center; justify-content: center; gap: 8px;
            font-family: 'Hind Siliguri', 'Outfit', sans-serif;
        }
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(168,85,247,0.45);
            filter: brightness(1.1);
        }
        .btn-submit:active { transform: translateY(1px); }

        /* Feedback message */
        .msg {
            font-size: 13px; margin-top: 14px; min-height: 20px;
            transition: all 0.3s ease;
            opacity: 0; transform: translateY(5px);
        }
        .msg.show { opacity: 1; transform: translateY(0); }
        .msg-error { color: var(--error-red); text-shadow: 0 0 10px rgba(255,71,87,0.25); }
        .msg-success { color: var(--success-green); text-shadow: 0 0 10px rgba(46,204,113,0.25); }

        /* Shake on wrong password */
        @keyframes errShake {
            0%, 100% { transform: translateX(0); }
            20%, 60% { transform: translateX(-8px); }
            40%, 80% { transform: translateX(8px); }
        }
        .shake { animation: errShake 0.4s ease-in-out; }

        /* Divider */
        .divider {
            display: flex; align-items: center; gap: 12px;
            margin: 22px 0 6px;
        }
        .divider-line {
            flex: 1; height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
        }
        .divider-text { font-size: 12px; color: var(--text-muted); white-space: nowrap; }

        /* Footer */
        .footer-info {
            position: fixed; bottom: 20px; width: 100%;
            font-size: 12px; color: var(--text-muted);
            z-index: 2; text-align: center;
        }
        .footer-info a {
            color: var(--electric-blue); text-decoration: none;
            transition: color 0.2s ease;
        }
        .footer-info a:hover { color: var(--neon-purple); }

        /* Loading overlay after success */
        #loadingOverlay {
            display: none;
            position: fixed; inset: 0; z-index: 999;
            background: var(--bg-dark);
            align-items: center; justify-content: center;
            flex-direction: column; gap: 20px;
            opacity: 0; transition: opacity 0.5s ease;
        }
        #loadingOverlay.visible {
            display: flex; opacity: 1;
        }
        .loading-dots {
            display: flex; gap: 8px;
        }
        .loading-dots span {
            width: 10px; height: 10px; border-radius: 50%;
            background: var(--neon-purple);
            animation: dotPulse 1.2s ease-in-out infinite;
        }
        .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
        .loading-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes dotPulse {
            0%, 80%, 100% { transform: scale(0.7); opacity: 0.4; }
            40% { transform: scale(1.1); opacity: 1; }
        }
        .loading-text {
            font-size: 14px; color: var(--text-muted); letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <!-- Ambient background -->
    <div class="bg-orb orb-1"></div>
    <div class="bg-orb orb-2"></div>
    <div class="bg-orb orb-3"></div>
    <div class="grid-pattern"></div>

    <!-- Login Card -->
    <div class="glass-card" id="loginCard">
        <div class="icon-wrap">
            <div class="icon-ring"></div>
            <div class="icon-main">🌙</div>
        </div>

        <h1 class="site-title">চাঁদের হাট</h1>
        <p class="site-subtitle">নিরাপদ অ্যাক্সেস গেটওয়ে</p>
        <span class="site-tag">@TEAM_HBS</span>

        <div class="input-group">
            <input
                type="password"
                id="passCode"
                class="password-input"
                placeholder="পাসওয়ার্ড লিখুন..."
                autocomplete="off"
                maxlength="20"
            />
        </div>

        <button class="btn-submit" id="submitBtn" onclick="validateAccess()">
            <span>প্রবেশ করুন</span>
            <span>→</span>
        </button>

        <p class="msg" id="feedbackMsg"></p>

        <div class="divider">
            <div class="divider-line"></div>
            <div class="divider-text">চাঁদের হাট v1.0</div>
            <div class="divider-line"></div>
        </div>
    </div>

    <!-- Loading overlay shown after success -->
    <div id="loadingOverlay">
        <div class="loading-dots">
            <span></span><span></span><span></span>
        </div>
        <p class="loading-text">লোড হচ্ছে...</p>
    </div>

    <!-- Footer -->
    <div class="footer-info">
        &copy; 2026 <a href="https://t.me/TEAM_HBS" target="_blank" rel="noopener">@TEAM_HBS</a>
        &nbsp;|&nbsp; সর্বস্বত্ব সংরক্ষিত
    </div>

    <script>
        const passInput  = document.getElementById('passCode');
        const loginCard  = document.getElementById('loginCard');
        const feedback   = document.getElementById('feedbackMsg');
        const overlay    = document.getElementById('loadingOverlay');

        // Allow Enter key to submit
        passInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') validateAccess();
        });

        function validateAccess() {
            const val = passInput.value.trim();

            // Reset feedback
            feedback.className = 'msg';

            if (val === 'HBS') {
                feedback.textContent = '✓ প্রবেশ সফল! লোড হচ্ছে...';
                feedback.classList.add('msg-success', 'show');

                setTimeout(() => {
                    loginCard.classList.add('fade-out');
                    overlay.classList.add('visible');

                    // Inject app.js into the page
                    setTimeout(() => {
                        const s = document.createElement('script');
                        s.src = 'app.js';
                        document.body.appendChild(s);
                    }, 800);
                }, 900);
            } else {
                feedback.textContent = '✗ ভুল পাসওয়ার্ড! আবার চেষ্টা করুন।';
                feedback.classList.add('msg-error', 'show');
                loginCard.classList.add('shake');
                passInput.value = '';
                passInput.focus();

                setTimeout(() => loginCard.classList.remove('shake'), 450);
            }
        }
    </script>
</body>
</html>
